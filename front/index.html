<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime gallery</title>
    <script src="/build/gallery.js"></script>
</head>
<body>
    <form action="/upload" enctype="multipart/form-data" method="post">
        <input type="file" name="anime" id="anime">
        <br><br>
        <input class="btn" id="submit" type="submit" value="Upload">
    </form>
    <br><br>
    <form action="/resize" enctype="multipart/form-data" method="post">
        <input type="hidden" name="resize" id="resize">
        <br><br>
        <input type="text" id="width" name="width" placeholder="Enter desired width">
        <input type="text" id="height" name="height" placeholder="Enter desired height">
        <input class="btn" type="submit" value="Resize">
    </form>
    <div id="gallery">

    </div>
</body>
</html>
